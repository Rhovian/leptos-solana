<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>leptos-solana demo</title>
    <link data-trunk rel="rust" />
    <style>
      :root {
        color-scheme: light dark;
        font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
      }
      body {
        margin: 0;
        padding: 32px 16px;
        max-width: 720px;
        margin-inline: auto;
        line-height: 1.5;
      }
      h1 { margin-top: 0; }
      section {
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 16px;
        margin-top: 16px;
      }
      button {
        padding: 8px 14px;
        border-radius: 6px;
        border: 1px solid #bbb;
        background: white;
        cursor: pointer;
        font: inherit;
      }
      button:disabled { opacity: 0.5; cursor: not-allowed; }
      .wallet-btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        border-radius: 6px;
        border: 2px solid #ddd;
        background: white;
        cursor: pointer;
        font: inherit;
      }
      .wallet-btn.selected {
        border-color: #4a90e2;
        background: #eaf3fc;
      }
      .wallet-btn img { width: 22px; height: 22px; }
      input[type="text"] {
        width: 100%;
        box-sizing: border-box;
        padding: 6px 8px;
        font-family: ui-monospace, monospace;
      }
      code { word-break: break-all; }
      .status {
        margin-top: 20px;
        padding: 10px 12px;
        background: #f5f5f5;
        border-radius: 6px;
        font-family: ui-monospace, monospace;
        font-size: 0.9em;
      }
      @media (prefers-color-scheme: dark) {
        section { border-color: #333; }
        button { background: #222; color: #eee; border-color: #444; }
        .wallet-btn { background: #222; color: #eee; border-color: #333; }
        .wallet-btn.selected { background: #1e2e44; border-color: #4a90e2; }
        .status { background: #1a1a1a; }
      }
    </style>
  </head>
  <body></body>
</html>
